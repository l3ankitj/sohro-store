<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pink-White Swatches</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: "Jost", sans-serif; }
    .grid { display: flex; gap: 20px; padding: 40px; flex-wrap: wrap; justify-content: center; }
    .swatch-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .swatch {
      width: 160px; height: 200px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }
    .swatch:hover { transform: translateY(-4px); }
    .hex {
      font-size: 13px; letter-spacing: 0.08em; color: #444;
      background: #fff; padding: 6px 14px; border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.1);
    }
    .label { font-size: 11px; color: #888; letter-spacing: 0.12em; text-transform: uppercase; }
    .current { font-size: 10px; color: #c8605a; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
  </style>
</head>
<body>
  <div class="grid">

    <div class="swatch-wrap">
      <div class="swatch" style="background:#FFFBFD;"></div>
      <div class="hex">#FFFBFD</div>
      <div class="label">Barely there</div>
    </div>

    <div class="swatch-wrap">
      <div class="swatch" style="background:#FFF5F9;"></div>
      <div class="hex">#FFF5F9</div>
      <div class="label">Petal mist</div>
      <div class="current">↑ Current</div>
    </div>

    <div class="swatch-wrap">
      <div class="swatch" style="background:#FFEEF5;"></div>
      <div class="hex">#FFEEF5</div>
      <div class="label">Rose frost</div>
    </div>

    <div class="swatch-wrap">
      <div class="swatch" style="background:#FFE4EF;"></div>
      <div class="hex">#FFE4EF</div>
      <div class="label">Blush white</div>
    </div>

    <div class="swatch-wrap">
      <div class="swatch" style="background:#FFD6E7;"></div>
      <div class="hex">#FFD6E7</div>
      <div class="label">Soft cherry</div>
    </div>

  </div>
</body>
</html>
