<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sohro — Store (Print)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&family=Marcellus&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    #boot { position: fixed; inset: 0; display: grid; place-items: center; background: #f7f3ec; z-index: 999; transition: opacity .4s ease; font-family: "Cormorant Garamond", serif; letter-spacing: .3em; color: #232019; font-size: 26px; }
    #boot.hide { opacity: 0; pointer-events: none; }

    /* ===== PRINT ===== */
    @page { size: A4 portrait; margin: 0.5cm; }

    @media print {
      html, body, [data-dir] {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        background: var(--bg) !important;
      }
      /* kill the splash + any interactive chrome */
      #boot { display: none !important; }
      .scrim, .drawer { display: none !important; }
      [class*="tweak"], [class*="Tweak"], [id*="tweak"], [id*="Tweak"] { display: none !important; }

      /* no motion / no clipping in print */
      * {
        transition: none !important;
        animation: none !important;
      }
      .card .ph, .cat-card .ph, .coll-card .ph { transform: none !important; }
      .card .quick { display: none !important; }

      /* header should not float over content */
      .header { position: static !important; backdrop-filter: none !important; background: var(--bg) !important; }

      /* let the tall hero & story bands fit on a page */
      .hero { min-height: 0 !important; }
      .hero-media .ph { min-height: 320px !important; }
      .hero h1 { font-size: 64px !important; }
      .story .ph { min-height: 360px !important; }
      .section { padding: 28px 0 !important; }

      /* keep visual blocks intact across page breaks */
      .hero, .story, .values,
      .card, .cat-card, .coll-card, .value,
      .section-head { break-inside: avoid; page-break-inside: avoid; }

      .footer { break-before: page; page-break-before: always; }
    }
  </style>
</head>
<body>
  <div id="boot">SOHRO</div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="app.jsx" data-presets="react"></script>

  <script>
    document.getElementById('boot').classList.add('hide');
  </script>

  <!-- auto-print once React is mounted, fonts loaded, and images settled -->
  <script type="text/babel" data-presets="react">
    (function () {
      function imagesReady() {
        const imgs = [...document.querySelectorAll('#root img')];
        if (imgs.length === 0) return Promise.resolve();
        return Promise.all(imgs.map(im => im.complete ? Promise.resolve()
          : new Promise(res => { im.onload = im.onerror = res; })));
      }
      function whenMounted() {
        return new Promise(res => {
          if (document.querySelector('#root .header')) return res();
          const obs = new MutationObserver(() => {
            if (document.querySelector('#root .header')) { obs.disconnect(); res(); }
          });
          obs.observe(document.getElementById('root'), { childList: true, subtree: true });
        });
      }
      Promise.all([whenMounted(), (document.fonts ? document.fonts.ready : Promise.resolve())])
        .then(imagesReady)
        .then(() => new Promise(r => setTimeout(r, 600)))
        .then(() => window.print());
    })();
  </script>
</body>
</html>
